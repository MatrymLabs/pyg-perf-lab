[tox]
envlist = py310, py311, py312
isolated_build = True

[testenv]
extras = dev
commands =
    ruff check .
    mypy src tests
    pytest -q

# Optional: run the real benchmarks (requires a torch build for your platform).
[testenv:bench]
extras = bench
commands =
    python scripts/bench_loader.py --device cpu --num-nodes 4000 --steps 10
